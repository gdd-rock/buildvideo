  <rect x="80" y="132" width="32" height="32" rx="4" fill="rgba(255,255,255,0.2)"/>
  <rect x="80" y="184" width="32" height="32" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="400" y="296" width="32" height="32" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="400" y="348" width="32" height="32" rx="4" fill="rgba(255,255,255,0.2)"/>
  <rect x="400" y="400" width="32" height="32" rx="4" fill="rgba(255,255,255,0.2)"/>
  <!-- Play triangle -->
  <path d="M200 148 L380 256 L200 364 Z" fill="url(#play)" opacity="0.95"/>
  <!-- Subtle build/gear accent -->
  <circle cx="290" cy="256" r="40" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="6" stroke-dasharray="12 8"/>
